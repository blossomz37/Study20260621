# The Last Word — post-apocalyptic dystopian thriller
# Research (Slice 2): Anton title / Oswald author; bold condensed impact, the
# 2024–26 dystopian convention (comps: Hum '24, The Dream Hotel '25, You Weren't
# Meant to Be Human '25). Art top zone is a BRIGHT amber/galaxy sky, not dark —
# light ice-white title needs a strong top scrim + soft dark glow to stay legible.
slug: the-last-word
source: ../../the-last-word-openai-l1.png

title: "The Last Word"
title_lines: ["THE LAST", "WORD"]
author: "A. MAY ZING"

title_font: anton            # static black condensed
author_font: oswald
author_axes: { wght: 500 }   # variable — pin or it renders default 400

text_color: "#F2F6FF"        # ice-white, cool tint vs warm amber
author_color: "#E6EBF5"

# title block lives in the upper sky band (galaxy core ~y0.10–0.20 is the bright spot)
safe_zone: { x: 0.07, y: 0.045, w: 0.86, h: 0.26 }
line_spacing: 1.04
v_align: 0.0

# author byline anchored at the FOOT of the cover, in its own zone over a
# bottom-up dark gradient band (contrast + depth over the glowing-book rubble)
author_zone: { x: 0.10, y: 0.875, w: 0.80, h: 0.085 }
author_scrim: { color: "#04060E", opacity: 0.82, direction: bottom, hold: 0.05, extent: 0.20 }
author_scale: 0.24
author_tracking: 2

# strong top scrim, held at full strength across the whole title band (hold) before
# fading — a plain linear fade dropped to ~12% over the bright galaxy and failed contrast
scrim: { color: "#04060E", opacity: 0.86, direction: top, hold: 0.34, extent: 0.52 }
# stroke + soft dark glow so letters survive over the brightest patch
stroke: { width: 0.03, color: "#0A0E18" }
shadow: { blur: 0.13, color: "#000000", opacity: 0.55, offset: 0.02 }

max_lines: 2
